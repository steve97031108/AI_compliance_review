# ============================================================
# Application Configuration
# ============================================================
server.port=8080

# ============================================================
# Vaadin Configuration - Disable Push to prevent connection lost
# ============================================================
vaadin.push-mode=DISABLED
vaadin.heartbeat-interval=300
vaadin.close-idle-sessions=false

# ============================================================
# Dev mode settings (?? devtools ???)
# ============================================================
vaadin.devmode.liveReload.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# ============================================================
# Session management
# ============================================================
server.servlet.session.timeout=30m
